<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTO.TCO — Avaliador de Carros Usados</title>
<meta name="description" content="Calcula o custo total real de qualquer carro usado em Portugal. TCO a 6 anos com análise de IA.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231e293b'/><text x='7' y='23' font-size='18' font-family='monospace' font-weight='bold' fill='%23d97706'>T</text></svg>">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:14px;-webkit-font-smoothing:antialiased}
  body{background:#f4f3ef;font-family:'Courier New',Courier,monospace;color:#1e293b}
  input,textarea,button{font-family:inherit}
  ::selection{background:#fde68a}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useCallback } = React;

const INK="#1e293b",MUTED="#64748b",FAINT="#94a3b8",BORDER="#e2e8f0",SURF="#fff",AMBER="#d97706",F="'Courier New',Courier,monospace";

const FUEL_LABEL={gasolina:"Gasolina",diesel:"Diesel",gpl:"GPL",hibrido:"Híbrido",eletrico:"Elétrico"};
const FUEL_S={
  gasolina:{bg:"#eff6ff",c:"#2563eb",b:"#bfdbfe"},
  diesel:  {bg:"#f8fafc",c:"#475569",b:"#e2e8f0"},
  gpl:     {bg:"#f0fdf4",c:"#16a34a",b:"#bbf7d0"},
  hibrido: {bg:"#fefce8",c:"#ca8a04",b:"#fef08a"},
  eletrico:{bg:"#f5f3ff",c:"#7c3aed",b:"#ddd6fe"},
};
const RISK_S={
  low:   {c:"#16a34a",bg:"#f0fdf4",b:"#bbf7d0",label:"Risco baixo"},
  medium:{c:"#d97706",bg:"#fffbeb",b:"#fde68a",label:"Risco médio"},
  high:  {c:"#dc2626",bg:"#fef2f2",b:"#fecaca",label:"Risco alto"},
};

const DEMO={
  name:"Dacia Jogger TCe 110 Comfort",year:2022,km:48000,price:16500,
  fuel:"gasolina",seats:7,boot:422,tco6yr:28640,monthlyTCO:398,residual:5200,
  reliability:8.5,riskLevel:"low",
  verdict:"Excelente custo-benefício para família — um dos TCO mais baixos do segmento em Portugal.",
  pros:["7 lugares a preço de 5","Fiabilidade Dacia acima da média","Valor residual sólido"],
  cons:["Motor TCe 110 sem grande entusiasmo","Interior básico vs concorrência","Sem opção híbrida neste motor"],
  knownIssues:"Motor TCe 110 usa corrente (não correia) — mais robusto que o TCe 90. Historial positivo até 150k km.",
  dealer:"Stand Lisboa Auto",warranty:"12 meses",_isDemo:true,
};

const SYSTEM_PROMPT=`És um especialista em carros usados em Portugal. O utilizador cola texto de um anúncio.
Devolve APENAS JSON válido sem markdown:
{"name":"Marca Modelo Versão","year":número,"km":número,"price":número,"fuel":"gasolina"|"diesel"|"gpl"|"hibrido"|"eletrico","seats":número,"boot":número,"tco6yr":número,"monthlyTCO":número,"residual":número,"reliability":número 0-10,"riskLevel":"low"|"medium"|"high","verdict":"1 frase honesta","pros":["até 3"],"cons":["até 3"],"knownIssues":"problemas conhecidos","dealer":"stand ou Particular","warranty":"garantia ou null"}
TCO 6 anos (90000km): GPL 0.85x7L=5355+2600mnt+720IUC+120IPO | Diesel 1.55x5.5L=7673+3800+1200+120 | Gasolina 1.70x7L=10710+2400+900+120
tco6yr=preco+combustivel+manutencao+IUC6+IPO3-residual2031 | monthlyTCO=tco6yr/72
Fiabilidade: Dacia/Toyota~9 Honda/Mazda/Hyundai/Kia~8.5 Skoda/VW~7.5 Renault/Ford/Seat~7 Opel/PSA/Fiat~6 BMW/Mercedes~6
Penalidades: TCe900-2.5 AL4/DP0-2.5 DPF>150k-1
Se insuficiente: {"error":"motivo"}`;

async function callClaude(text,url,key){
  const content=url?`URL: ${url}\n\n${text}`:text;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1000,system:SYSTEM_PROMPT,messages:[{role:"user",content}]}),
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Erro ${r.status}`);}
  const d=await r.json();
  const raw=(d.content?.[0]?.text||"").replace(/```[\w]*/g,"").replace(/```/g,"").trim();
  const m=raw.match(/\{[\s\S]+\}/);
  if(!m)throw new Error("Resposta inesperada — tenta novamente");
  const p=JSON.parse(m[0]);
  if(p.error)throw new Error(p.error);
  return p;
}

function score(car){
  function n(v,mn,mx,hi=true){const c=Math.max(mn,Math.min(mx,v));return((hi?c-mn:mx-c)/(mx-mn))*10;}
  const fp={gpl:.85,diesel:1.55,gasolina:1.70,hibrido:1.30}[car.fuel]??1.70;
  const fc={gpl:7,diesel:5.5,gasolina:7,hibrido:5}[car.fuel]??7;
  const dims={
    tco:        n(car.tco6yr||26000,22000,35000,false),
    price:      n(car.price||10000,3000,18000,false),
    reliability:Math.max(0,Math.min(10,car.reliability??6)),
    boot:       n(car.boot||400,280,800,true),
    fuelCost:   n(90000/100*fc*fp,4000,12000,false),
    residual:   n(car.residual||500,100,6000,true),
    fuelType:   car.fuel==="gpl"||car.fuel==="eletrico"?10:car.fuel==="hibrido"?8:car.fuel==="diesel"?5:4,
  };
  const W={tco:3,price:2,reliability:2.5,boot:1,fuelCost:1.5,residual:1.5,fuelType:1};
  const tw=Object.values(W).reduce((a,b)=>a+b,0);
  return{total:Math.min(100,Math.round(Object.keys(W).reduce((s,k)=>s+(dims[k]??5)*W[k],0)/tw*10)),dims};
}

const onF=e=>e.target.style.borderColor=INK;
const onB=e=>e.target.style.borderColor=BORDER;

function Ring({s,size=72}){
  const color=s>=72?AMBER:s>=52?INK:"#ef4444";
  const r=(size-7)/2,circ=2*Math.PI*r,dash=(Math.max(0,Math.min(100,s))/100)*circ;
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{position:"absolute",transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f1f5f9" strokeWidth={6}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6}
          strokeDasharray={circ.toFixed(1)} strokeDashoffset={(circ-dash).toFixed(1)} strokeLinecap="round"/>
      </svg>
      <span style={{position:"relative",fontSize:size>60?16:12,fontWeight:800,color,fontFamily:"monospace"}}>{s}</span>
    </div>
  );
}

function Bar({label,value}){
  const pct=Math.max(0,Math.min(100,(value/10)*100));
  const color=value>=7?"#16a34a":value>=4.5?AMBER:"#ef4444";
  return(
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
      <span style={{fontSize:11,color:FAINT,width:90,flexShrink:0}}>{label}</span>
      <div style={{flex:1,height:3,background:"#f1f5f9",borderRadius:9,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:9}}/>
      </div>
      <span style={{fontSize:10,color:FAINT,width:24,textAlign:"right",fontFamily:"monospace"}}>{value?.toFixed?value.toFixed(1):value}</span>
    </div>
  );
}

function Chip({bg,c,b,children}){
  return <span style={{fontSize:10,padding:"3px 9px",borderRadius:99,background:bg,color:c,border:`1px solid ${b}`,fontWeight:700,whiteSpace:"nowrap"}}>{children}</span>;
}

function Settings({apiKey,onSave,onClose}){
  const [k,setK]=useState(apiKey||"");
  const [show,setShow]=useState(false);
  const valid=k.startsWith("sk-ant-");
  return(
    <div style={{position:"fixed",inset:0,zIndex:60,display:"flex",justifyContent:"flex-end"}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(15,23,42,0.2)",cursor:"pointer"}}/>
      <div style={{position:"relative",width:380,maxWidth:"92vw",background:SURF,height:"100%",overflowY:"auto",boxShadow:"-12px 0 40px rgba(0,0,0,0.08)"}}>
        <div style={{padding:"20px 24px",borderBottom:`1px solid ${BORDER}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:SURF,zIndex:1}}>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:INK}}>Definições</div>
            <div style={{fontSize:11,color:FAINT,marginTop:2}}>Chave API Anthropic</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:FAINT,lineHeight:1,padding:4}}>×</button>
        </div>
        <div style={{padding:"24px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:valid?"#16a34a":k?"#d97706":"#e2e8f0"}}/>
            <span style={{fontSize:12,color:valid?"#16a34a":k?AMBER:FAINT}}>
              {valid?"Chave válida":k?"Formato inválido (sk-ant-...)":"Sem chave configurada"}
            </span>
          </div>
          <div style={{position:"relative",marginBottom:12}}>
            <input type={show?"text":"password"} value={k} onChange={e=>setK(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&valid&&(onSave(k),onClose())}
              placeholder="sk-ant-api03-..."
              style={{width:"100%",background:"#f8fafc",border:`1px solid ${BORDER}`,borderRadius:8,padding:"12px 60px 12px 14px",fontSize:12,outline:"none",color:INK}}
              onFocus={onF} onBlur={onB}/>
            <button onClick={()=>setShow(v=>!v)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:11,color:FAINT,padding:0}}>
              {show?"ocultar":"ver"}
            </button>
          </div>
          <button onClick={()=>{if(valid){onSave(k);onClose();}}} disabled={!valid}
            style={{width:"100%",background:valid?INK:"#e2e8f0",color:valid?"#fff":FAINT,border:"none",borderRadius:8,padding:"12px",fontSize:12,fontWeight:800,cursor:valid?"pointer":"not-allowed",marginBottom:28}}>
            Guardar chave
          </button>
          <div className="lbl" style={{marginBottom:10}}>Como obter a chave</div>
          <ol style={{fontSize:12,color:MUTED,lineHeight:2.2,paddingLeft:18,marginBottom:24}}>
            <li>Vai a <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:AMBER}}>console.anthropic.com</a></li>
            <li>Cria conta (gratuita) ou faz login</li>
            <li>API Keys &rarr; Create Key</li>
            <li>Copia e cola acima</li>
          </ol>
          <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"14px 16px",marginBottom:20}}>
            <div className="lbl" style={{color:"#92400e",marginBottom:8}}>Custo por análise</div>
            <div style={{fontSize:12,color:"#92400e",lineHeight:1.9}}>
              Usa o modelo <b>Claude Haiku</b> — o mais económico.<br/>
              Cada análise custa aproximadamente <b>$0.001</b><br/>
              (1000 análises ≈ $1 dólar)
            </div>
          </div>
          <div style={{fontSize:11,color:FAINT,lineHeight:1.8}}>
            A chave é guardada apenas no teu browser (localStorage). Nunca passa pelos servidores desta aplicação.
          </div>
          {apiKey&&<button onClick={()=>{onSave("");onClose();}} style={{marginTop:24,width:"100%",background:"none",border:"1px solid #fecaca",borderRadius:8,padding:"11px",fontSize:12,color:"#dc2626",cursor:"pointer"}}>Remover chave guardada</button>}
        </div>
      </div>
    </div>
  );
}

function Result({car,onReset}){
  const fs=FUEL_S[car.fuel]||FUEL_S.gasolina;
  const rs=RISK_S[car.riskLevel]||RISK_S.medium;
  const {total,dims}=score(car);
  const sc=total>=72?AMBER:total>=52?INK:"#ef4444";
  return(
    <div>
      {car._isDemo&&(
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#92400e"}}>
          <b>Exemplo demonstrativo</b> — dados fictícios para ilustrar a análise. Cola um anúncio real para a tua análise personalizada.
        </div>
      )}

      {/* Header */}
      <div style={{background:INK,borderRadius:10,padding:"24px",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:20,flexWrap:"wrap"}}>
          <Ring s={total} size={80}/>
          <div style={{flex:1,minWidth:180}}>
            <div style={{fontSize:17,fontWeight:800,color:"#fff",lineHeight:1.3,marginBottom:6}}>{car.name}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:12}}>
              {car.year} &middot; {car.km?(car.km/1000).toFixed(0)+"k km":"—"} &middot; {(car.price||0).toLocaleString("pt-PT")}&#8364;
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <Chip bg={fs.bg} c={fs.c} b={fs.b}>{FUEL_LABEL[car.fuel]||car.fuel}</Chip>
              <Chip bg={rs.bg} c={rs.c} b={rs.b}>{rs.label}</Chip>
              {car.dealer&&<Chip bg="rgba(255,255,255,0.07)" c="rgba(255,255,255,0.45)" b="rgba(255,255,255,0.1)">{car.dealer}</Chip>}
            </div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:28,fontWeight:800,color:sc,fontFamily:"monospace",lineHeight:1}}>{((car.tco6yr||0)/1000).toFixed(1)}k&#8364;</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:4}}>TCO 6 anos</div>
            <div style={{fontSize:18,fontWeight:700,color:"rgba(255,255,255,0.65)",marginTop:10,fontFamily:"monospace"}}>{car.monthlyTCO||"—"}&#8364;<span style={{fontSize:11,fontWeight:400}}>/mês</span></div>
          </div>
        </div>
      </div>

      {/* Metrics */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
        {[
          {l:"Residual 2031",v:(car.residual||0).toLocaleString("pt-PT")+"€"},
          {l:"Bagageira",    v:(car.boot||"—")+"L"},
          {l:"Lugares",     v:car.seats||5},
          {l:"Fiabilidade", v:(car.reliability||"—")+"/10",c:rs.c},
          {l:"Garantia",    v:car.warranty||"—"},
          {l:"Combustível", v:FUEL_LABEL[car.fuel]||car.fuel},
        ].map(({l,v,c})=>(
          <div key={l} style={{background:SURF,border:`1px solid ${BORDER}`,borderRadius:8,padding:"12px 14px"}}>
            <div className="lbl" style={{marginBottom:6}}>{l}</div>
            <div style={{fontSize:14,fontWeight:800,color:c||INK,fontFamily:"monospace"}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Analysis */}
      <div style={{background:SURF,border:`1px solid ${BORDER}`,borderRadius:10,padding:"20px",marginBottom:10}}>
        <div className="lbl" style={{marginBottom:14}}>Avaliação por dimensão</div>
        <Bar label="TCO 6 anos"     value={dims.tco}/>
        <Bar label="Preço"          value={dims.price}/>
        <Bar label="Fiabilidade"    value={dims.reliability}/>
        <Bar label="Bagageira"      value={dims.boot}/>
        <Bar label="Combustível"    value={dims.fuelType}/>
        <Bar label="Valor residual" value={dims.residual}/>
        {car.verdict&&(
          <div style={{marginTop:18,paddingTop:18,borderTop:`1px solid ${BORDER}`,fontSize:13,color:MUTED,lineHeight:1.7,fontStyle:"italic"}}>
            "{car.verdict}"
          </div>
        )}
      </div>

      {/* Pros / Cons */}
      {(car.pros?.length>0||car.cons?.length>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {car.pros?.length>0&&(
            <div style={{background:SURF,border:`1px solid ${BORDER}`,borderRadius:10,padding:"16px 18px"}}>
              <div className="lbl" style={{color:"#16a34a",marginBottom:12}}>Positivo</div>
              {car.pros.map((p,i)=>(
                <div key={i} style={{fontSize:12,color:INK,display:"flex",gap:8,marginBottom:7,lineHeight:1.5}}>
                  <span style={{color:"#16a34a",fontWeight:800,flexShrink:0}}>+</span>{p}
                </div>
              ))}
            </div>
          )}
          {car.cons?.length>0&&(
            <div style={{background:SURF,border:`1px solid ${BORDER}`,borderRadius:10,padding:"16px 18px"}}>
              <div className="lbl" style={{color:"#ef4444",marginBottom:12}}>Negativo</div>
              {car.cons.map((c,i)=>(
                <div key={i} style={{fontSize:12,color:INK,display:"flex",gap:8,marginBottom:7,lineHeight:1.5}}>
                  <span style={{color:"#ef4444",fontWeight:800,flexShrink:0}}>−</span>{c}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Known issues */}
      {car.knownIssues&&(
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"12px 16px",marginBottom:10,fontSize:12,color:"#92400e",lineHeight:1.6}}>
          <b>Problemas conhecidos:</b> {car.knownIssues}
        </div>
      )}

      {/* Actions */}
      <div style={{display:"flex",gap:10,paddingTop:6,flexWrap:"wrap"}}>
        {car.sourceUrl&&(
          <a href={car.sourceUrl} target="_blank" rel="noreferrer"
            style={{fontSize:12,color:INK,textDecoration:"none",padding:"10px 16px",border:`1px solid ${BORDER}`,borderRadius:7,background:SURF,fontWeight:600}}>
            Ver anúncio original
          </a>
        )}
        <button onClick={onReset}
          style={{fontSize:12,color:"#fff",background:INK,border:"none",borderRadius:7,padding:"10px 22px",cursor:"pointer",fontWeight:700,marginLeft:"auto"}}>
          Nova análise
        </button>
      </div>
    </div>
  );
}

    {title:"Comparação lado a lado",   desc:"Até 4 carros em simultâneo numa tabela detalhada"},

                    </div>

        </div>

        <div className="lbl" style={{marginBottom:14}}>Packs de créditos</div>

            {name:"Starter", qty:"50 análises", price:"2€", note:"para começar"},
            {name:"Standard",qty:"200 análises",price:"6€", note:"uso regular"},
            {name:"Pro",     qty:"600 análises",price:"12€",note:"melhor valor",highlight:true},
          ].map(({name,qty,price,note,highlight})=>(
            <div key={name} style={{border:`1px solid ${highlight?INK:BORDER}`,borderRadius:8,padding:"14px",textAlign:"center",background:highlight?"#f8fafc":SURF}}>
              <div className="lbl" style={{marginBottom:8}}>{name}</div>
              <div style={{fontSize:22,fontWeight:800,color:INK,fontFamily:"monospace",marginBottom:3}}>{price}</div>
              <div style={{fontSize:11,color:FAINT,marginBottom:3}}>{qty}</div>
              <div style={{fontSize:10,color:FAINT,fontStyle:"italic"}}>{note}</div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:14,flexWrap:"wrap",padding:"16px",background:"#f8fafc",borderRadius:8,border:`1px solid ${BORDER}`}}>
          <span style={{fontSize:12,color:MUTED,lineHeight:1.7}}>Quer ser avisado quando a versão Pro estiver disponível?</span>
          <a href="mailto:?subject=AUTO.TCO Pro - avisa-me quando estiver disponivel"
            style={{display:"inline-block",background:INK,color:"#fff",borderRadius:7,padding:"10px 20px",fontSize:12,fontWeight:700,textDecoration:"none",whiteSpace:"nowrap"}}>
            Receber aviso
          </a>
        </div>

        <div style={{marginTop:14,fontSize:11,color:FAINT,textAlign:"center"}}>
          Versão gratuita: 1 análise de cada vez &middot; requer chave API Anthropic própria
        </div>
      </div>
    </div>
  );
}

function App(){
  const [apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem("atco_key")||"";}catch{return "";}});
  const [showS,setShowS]=useState(false);
  const saveKey=k=>{setApiKey(k);try{k?localStorage.setItem("atco_key",k):localStorage.removeItem("atco_key");}catch{}};

  const [text,setText]=useState("");
  const [url,setUrl]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [result,setResult]=useState(null);

  const analyze=useCallback(async()=>{
    if(!text.trim())return;
    if(!apiKey){setShowS(true);return;}
    setLoading(true);setError("");
    try{
      const data=await callClaude(text.trim(),url.trim(),apiKey);
      setResult({...data,sourceUrl:url.trim()||null,monthlyTCO:data.monthlyTCO||Math.round((data.tco6yr||0)/72)});
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[text,url,apiKey]);

  const loadDemo=()=>{setResult({...DEMO});setError("");};
  const reset=()=>{setResult(null);setText("");setUrl("");setError("");};

  return(
    <div style={{minHeight:"100vh",background:"#f4f3ef",paddingBottom:80}}>

      {/* Header */}
      <div style={{background:SURF,borderBottom:`1px solid ${BORDER}`,padding:"14px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:20}}>
        <div style={{display:"flex",alignItems:"baseline",gap:10}}>
          <div style={{fontSize:18,fontWeight:800,color:INK,letterSpacing:"-0.5px"}}>AUTO<span style={{color:AMBER}}>.</span>TCO</div>
          <div style={{fontSize:11,color:FAINT}}>custo total de propriedade &middot; Portugal</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:apiKey?"#16a34a":"#d1d5db"}}/>
            <span style={{fontSize:11,color:apiKey?"#16a34a":FAINT}}>{apiKey?"API activa":"sem API"}</span>
          </div>
          <button onClick={()=>setShowS(true)}
            style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:6,padding:"7px 14px",fontSize:11,cursor:"pointer",color:MUTED,fontWeight:600}}>
            Definições
          </button>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"32px 20px"}}>
        {result?(
          <Result car={result} onReset={reset}/>
        ):(
          <>
            {/* Input */}
            <div style={{background:SURF,border:`1px solid ${BORDER}`,borderRadius:10,padding:"24px",marginBottom:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
              <div className="lbl" style={{marginBottom:16}}>Analisar anúncio</div>
              <input type="url" value={url} onChange={e=>setUrl(e.target.value)} disabled={loading}
                placeholder="URL do anúncio (opcional) — standvirtual.com, olx.pt, custojusto.pt"
                style={{width:"100%",background:"#f8fafc",border:`1px solid ${BORDER}`,borderRadius:7,padding:"11px 14px",fontSize:12,outline:"none",color:INK,marginBottom:10}}
                onFocus={onF} onBlur={onB}/>
              <textarea value={text} onChange={e=>setText(e.target.value)} disabled={loading}
                placeholder={"Cola aqui o texto do anúncio...\n\nEx: Dacia Jogger 1.0 ECO-G GPL 100cv · 2022 · 48 000 km · 16 500€\n7 lugares · Stand Lisboa Auto · Garantia 12 meses · Livro revisões completo"}
                style={{width:"100%",minHeight:130,background:"#f8fafc",border:`1px solid ${BORDER}`,borderRadius:7,padding:"12px 14px",fontSize:12,outline:"none",color:INK,resize:"vertical",lineHeight:1.7,display:"block",opacity:loading?.6:1}}
                onFocus={onF} onBlur={onB}/>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginTop:14,gap:14}}>
                <div style={{fontSize:11,color:FAINT,lineHeight:1.9}}>
                  Abre o anúncio &rarr; <b style={{color:MUTED}}>Ctrl+A</b> &rarr; <b style={{color:MUTED}}>Ctrl+C</b> &rarr; cola aqui.<br/>
                  O URL é opcional — guarda o link no resultado.
                </div>
                <button onClick={analyze} disabled={loading||!text.trim()}
                  style={{background:!text.trim()||loading?"#d1d5db":INK,color:"#fff",border:"none",borderRadius:7,padding:"11px 22px",fontSize:12,fontWeight:800,cursor:!text.trim()||loading?"not-allowed":"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                  {loading?"A analisar...":"Analisar"}
                </button>
              </div>
              {!apiKey&&(
                <div style={{marginTop:14,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,background:"#fffbeb",border:"1px solid #fde68a",borderRadius:7,padding:"11px 14px"}}>
                  <span style={{fontSize:12,color:"#92400e"}}>Precisas de uma chave API Anthropic para analisar.</span>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={loadDemo} style={{fontSize:11,color:MUTED,background:SURF,border:`1px solid ${BORDER}`,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontWeight:600}}>
                      Ver exemplo
                    </button>
                    <button onClick={()=>setShowS(true)} style={{fontSize:11,color:"#fff",background:"#92400e",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontWeight:700}}>
                      Configurar API
                    </button>
                  </div>
                </div>
              )}
            </div>

            {error&&(
              <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:7,padding:"12px 16px",fontSize:12,color:"#dc2626",marginBottom:14,lineHeight:1.6}}>
                {error}
              </div>
            )}

            {/* How it works */}
            <div style={{textAlign:"center",padding:"36px 20px 20px"}}>
              <div style={{fontSize:16,fontWeight:800,color:INK,marginBottom:10}}>Como funciona</div>
              <div style={{fontSize:12,color:FAINT,lineHeight:2.3,marginBottom:28}}>
                1. Abre o anúncio no Standvirtual, OLX ou CustoJusto<br/>
                2. <b style={{color:MUTED}}>Ctrl+A</b> &rarr; <b style={{color:MUTED}}>Ctrl+C</b> para copiar<br/>
                3. Cola acima e clica <b style={{color:MUTED}}>Analisar</b>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,maxWidth:480,margin:"0 auto 20px"}}>
                {[
                  {label:"Score 0–100",    desc:"TCO, fiabilidade, bagageira e combustível"},
                  {label:"Custo real/mês", desc:"Todos os custos a 6 anos divididos por 72"},
                  {label:"Problemas",      desc:"Issues conhecidos do modelo analisado"},
                ].map(({label,desc})=>(
                  <div key={label} style={{background:SURF,border:`1px solid ${BORDER}`,borderRadius:8,padding:"16px 12px",textAlign:"center"}}>
                    <div style={{fontSize:12,fontWeight:800,color:INK,marginBottom:5}}>{label}</div>
                    <div style={{fontSize:10,color:FAINT,lineHeight:1.6}}>{desc}</div>
                  </div>
                ))}
              </div>
              <button onClick={loadDemo} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:7,padding:"9px 18px",fontSize:11,color:MUTED,cursor:"pointer",fontWeight:600}}>
                Ver análise de exemplo
              </button>
            </div>

            <ProBanner/>
          </>
        )}
      </div>

      {showS&&<Settings apiKey={apiKey} onSave={saveKey} onClose={()=>setShowS(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
