<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

// ─── CLAUDE API ───────────────────────────────────────────────────────────────

const SYSTEM_PROMPT = `És um especialista em carros usados em Portugal.
O utilizador cola texto de um anúncio (Standvirtual, OLX, CustoJusto).
Devolve APENAS JSON válido, sem markdown, sem texto extra:
{
  "name": "Marca Modelo Versão",
  "year": número,
  "km": número,
  "price": número (euros),
  "fuel": "gasolina" | "diesel" | "gpl" | "hibrido" | "eletrico",
  "seats": número (5 por defeito),
  "boot": número (litros — estima pelo modelo se não indicado),
  "tco6yr": número,
  "monthlyTCO": número,
  "residual": número,
  "reliability": número 0–10,
  "riskLevel": "low" | "medium" | "high",
  "verdict": "1 frase de avaliação honesta",
  "pros": ["até 3 pontos positivos"],
  "cons": ["até 3 pontos negativos"],
  "knownIssues": "problemas conhecidos deste modelo específico",
  "dealer": "nome do stand ou Particular",
  "warranty": "garantia mencionada ou null"
}

CÁLCULO TCO 6 ANOS (90 000 km adicionais):
GPL:      0.85€/L × 7.0L/100km = 5 355€ + manutenção 2 600€ + IUC×6 720€  + IPO×3 120€
Diesel:   1.55€/L × 5.5L/100km = 7 673€ + manutenção 3 800€ + IUC×6 1 200€ + IPO×3 120€
Gasolina: 1.70€/L × 7.0L/100km = 10 710€ + manutenção 2 400€ + IUC×6 900€  + IPO×3 120€
H�brido:  1.30€/L × 5.0L/100km = 5 850€ + manutenção 2 800€ + IUC×6 900€  + IPO×3 120€

tco6yr = preço + combustível + manutenção + IUC×6 + IPO×3 − residual_2031
monthlyTCO = tco6yr ÷ 72

Residual 2031: estima pelo modelo, idade actual + 6 anos, km actual + 90 000.

Fiabilidade (base por marca):
Dacia/Toyota ≈ 9 | Honda/Mazda/Hyundai/Kia ≈ 8.5 | Skoda/VW/Nissan ≈ 7.5
Renault/Ford/Seat/Mitsubishi ≈ 7 | Opel/Peugeot/Citroën/Fiat ≈ 6 | BMW/Mercedes/Audi ≈ 6
Penalidades: motor Renault TCe 900cc −2.5 | caixas AL4/DP0 −2.5 | DPF com >150k km −1 | turbo diesel >200k km −1.5

riskLevel: "low" se reliability ≥ 7 e km < 130k e idade < 9 anos
           "high" se reliability < 5.5 ou km > 180k ou idade > 13 anos
           "medium" caso contrário

Se não conseguires identificar o carro: {"error": "motivo em português"}`;

async function callClaude(text, url, apiKey) {
  const content = url ? `URL do anúncio: ${url}\n\nTexto:\n${text}` : text;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: [{ role: "user", content }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Erro API ${res.status}`);
  }
  const data = await res.json();
  const raw = (data.content?.[0]?.text || "").replace(/```[\w]*/g, "").replace(/```/g, "").trim();
  const match = raw.match(/\{[\s\S]+\}/);
  if (!match) throw new Error("Resposta inesperada — tenta novamente");
  const parsed = JSON.parse(match[0]);
  if (parsed.error) throw new Error(parsed.error);
  return parsed;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

const FUEL_LABEL = { gasolina:"Gasolina", diesel:"Diesel", gpl:"GPL", hibrido:"Híbrido", eletrico:"Elétrico" };
const FUEL_COLOR = {
  gasolina: { bg:"#dbeafe", text:"#1d4ed8" },
  diesel:   { bg:"#f1f5f9", text:"#475569" },
  gpl:      { bg:"#d1fae5", text:"#065f46" },
  hibrido:  { bg:"#fef9c3", text:"#854d0e" },
  eletrico: { bg:"#ede9fe", text:"#6d28d9" },
};
const RISK_COLOR = { low:"#059669", medium:"#d97706", high:"#dc2626" };
const RISK_LABEL = { low:"RISCO BAIXO", medium:"RISCO MÉDIO", high:"RISCO ALTO" };

const scoreColor = n => n >= 72 ? "#d97706" : n >= 52 ? "#6366f1" : "#dc2626";

function ScoreRing({ score, size = 72 }) {
  const r = (size - 8) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (Math.max(0, Math.min(100, score)) / 100) * circ;
  const color = scoreColor(score);
  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ position:"absolute", transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f1f5f9" strokeWidth={7}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={7}
          strokeDasharray={circ.toFixed(1)} strokeDashoffset={(circ-dash).toFixed(1)} strokeLinecap="round"/>
      </svg>
      <span style={{ position:"relative", fontSize:18, fontWeight:800, color, fontFamily:"monospace" }}>{score}</span>
    </div>
  );
}

function Bar({ label, value }) {
  const pct = Math.max(0, Math.min(100, (value / 10) * 100));
  const color = value >= 7 ? "#059669" : value >= 4.5 ? "#d97706" : "#dc2626";
  return (
    <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
      <span style={{ fontSize:12, color:"#94a3b8", width:90, flexShrink:0 }}>{label}</span>
      <div style={{ flex:1, height:5, background:"#f1f5f9", borderRadius:9, overflow:"hidden" }}>
        <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:9 }}/>
      </div>
      <span style={{ fontSize:11, color:"#94a3b8", width:26, textAlign:"right", fontFamily:"monospace" }}>{value?.toFixed(1)}</span>
    </div>
  );
}

// ─── SCORE CALCULATION (local, fixed weights) ─────────────────────────────────

function computeScore(car) {
  const fp = { gpl:0.85, diesel:1.55, gasolina:1.70, hibrido:1.30 }[car.fuel] ?? 1.70;
  const fc = { gpl:7.0,  diesel:5.5,  gasolina:7.0,  hibrido:5.0  }[car.fuel] ?? 7.0;
  const fuelCostEst = 90000 / 100 * fc * fp;

  function norm(v, mn, mx, hi = true) {
    const c = Math.max(mn, Math.min(mx, v));
    return ((hi ? c - mn : mx - c) / (mx - mn)) * 10;
  }

  const dims = {
    tco:         norm(car.tco6yr   || 26000, 22000, 33000, false),
    price:       norm(car.price    || 10000,  3000, 17000, false),
    reliability: Math.max(0, Math.min(10, car.reliability ?? 6)),
    boot:        norm(car.boot     || 400,     280,   750,  true),
    fuelCost:    norm(fuelCostEst,             4000, 12000, false),
    residual:    norm(car.residual || 500,      100,  5000, true),
    fuelType:    car.fuel==="gpl"||car.fuel==="eletrico" ? 10 : car.fuel==="hibrido" ? 8 : car.fuel==="diesel" ? 5 : 4,
  };

  // Fixed weights for free version
  const W = { tco:3, price:2, reliability:2.5, boot:1, fuelCost:1.5, residual:1.5, fuelType:1 };
  const tw = Object.values(W).reduce((a,b) => a+b, 0);
  const total = Math.min(100, Math.round(
    Object.keys(W).reduce((s, k) => s + (dims[k] ?? 5) * W[k], 0) / tw * 10
  ));
  return { score: total, _dims: dims };
}

        </div>
        <div style={{ fontSize:22, fontWeight:800, color:"#fff", marginBottom:6, fontFamily:F }}>
          AUTO.TCO <span style={{ color:"#d97706" }}>PRO</span>
        </div>
        <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", lineHeight:1.7 }}>
          A vers\u00e3o completa para quem compra carros a s\u00e9rio.<br/>
          Sem API key pr\u00f3pria. Paga s\u00f3 o que usas.
        </div>
      </div>

      {/* Features grid */}
      <div style={{ background:"#fff", padding:"20px" }}>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20 }}>
          {features.map(({ icon, title, desc }) => (
            <div key={title} style={{ display:"flex", gap:12, alignItems:"flex-start", padding:"12px 14px", background:"#f8fafc", borderRadius:8, border:"1px solid #f1f5f9" }}>
              <span style={{ fontSize:22, flexShrink:0, lineHeight:1 }}>{icon}</span>
              <div>
                <div style={{ fontSize:12, fontWeight:700, color:"#1e293b", marginBottom:3 }}>{title}</div>
                <div style={{ fontSize:11, color:"#94a3b8", lineHeight:1.5 }}>{desc}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Pricing teaser */}
        <div style={{ background:"#fffbeb", border:"1px solid #fde68a", borderRadius:10, padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, flexWrap:"wrap", marginBottom:14 }}>
          <div>
            <div style={{ fontSize:11, fontWeight:700, color:"#92400e", letterSpacing:"1px", textTransform:"uppercase", marginBottom:10 }}>Packs de cr\u00e9ditos</div>
            <div style={{ display:"flex", gap:20, flexWrap:"wrap" }}>
              {[
                { label:"Starter",  credits:"50 an\u00e1lises",  price:"2\u20ac" },
                { label:"Standard", credits:"200 an\u00e1lises", price:"6\u20ac" },
                { label:"Pro",      credits:"600 an\u00e1lises", price:"12\u20ac" },
              ].map(({ label, credits, price }) => (
                <div key={label} style={{ textAlign:"center" }}>
                  <div style={{ fontSize:11, color:"#92400e", fontWeight:700 }}>{label}</div>
                  <div style={{ fontSize:16, color:"#1e293b", fontWeight:800, fontFamily:"monospace" }}>{price}</div>
                  <div style={{ fontSize:10, color:"#94a3b8" }}>{credits}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ textAlign:"center", flexShrink:0 }}>
            <div style={{ fontSize:10, color:"#94a3b8", marginBottom:8 }}>Avisa-me quando estiver dispon\u00edvel</div>
            <a href="mailto:?subject=AUTO.TCO Pro - quero acesso"
              style={{ display:"inline-block", background:"#d97706", color:"#fff", borderRadius:8, padding:"11px 20px", fontSize:13, fontWeight:800, textDecoration:"none", fontFamily:"'Courier New',monospace" }}>
              \u2709 Receber aviso
            </a>
          </div>
        </div>

        <div style={{ textAlign:"center", fontSize:11, color:"#cbd5e1" }}>
          Vers\u00e3o gratuita: 1 an\u00e1lise de cada vez \u00b7 requer chave API Anthropic pr\u00f3pria
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem("atco_key") || ""; } catch { return ""; } });
  const [showSettings, setShowSettings] = useState(false);

  const saveKey = k => {
    setApiKey(k);
    try { k ? localStorage.setItem("atco_key", k) : localStorage.removeItem("atco_key"); } catch {}
  };

  const [text, setText]     = useState("");
  const [url, setUrl]       = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError]   = useState("");
  const [result, setResult] = useState(null);

  const analyze = useCallback(async () => {
    if (!text.trim()) return;
    if (!apiKey) { setShowSettings(true); return; }
    setLoading(true); setError("");
    try {
      const data = await callClaude(text.trim(), url.trim(), apiKey);
      const { score, _dims } = computeScore(data);
      setResult({ ...data, score, _dims, sourceUrl: url.trim() || null, monthlyTCO: data.monthlyTCO || Math.round((data.tco6yr||0)/72) });
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }, [text, url, apiKey]);

  const reset = () => { setResult(null); setText(""); setUrl(""); setError(""); };

  const F = "'Courier New',Courier,monospace";

  return (
    <div style={{ minHeight:"100vh", background:"#f7f6f2", fontFamily:F, paddingBottom:80 }}>

      {/* HEADER */}
      <div style={{ background:"#fff", borderBottom:"2px solid #1e293b", padding:"14px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:20 }}>
        <div>
          <div style={{ fontSize:20, fontWeight:800, color:"#1e293b" }}>AUTO<span style={{ color:"#d97706" }}>.</span>TCO</div>
          <div style={{ fontSize:11, color:"#94a3b8", marginTop:3 }}>avaliador de carros usados · custo total a 6 anos · Portugal</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <div style={{ display:"flex", alignItems:"center", gap:7 }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:apiKey?"#059669":"#cbd5e1" }}/>
            <span style={{ fontSize:11, color:apiKey?"#059669":"#94a3b8" }}>{apiKey ? "API ligada" : "sem API"}</span>
          </div>
          <button onClick={() => setShowSettings(true)}
            style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:7, padding:"8px 16px", fontSize:13, cursor:"pointer", fontFamily:F, color:"#475569", fontWeight:600 }}>
            ⚙ Definições
          </button>
        </div>
      </div>

      <div style={{ maxWidth:720, margin:"0 auto", padding:"28px 20px" }}>

        {/* RESULT */}
        {result ? (
          <Result car={result} onReset={reset} />
        ) : (
          <>
            {/* INPUT CARD */}
            <div style={{ background:"#fff", border:"2px solid #1e293b", borderRadius:12, padding:"24px", marginBottom:20 }}>
              <div style={{ fontSize:11, fontWeight:800, color:"#64748b", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:16 }}>
                Analisar Anúncio
              </div>

              {/* URL */}
              <input
                type="url"
                value={url}
                onChange={e => setUrl(e.target.value)}
                placeholder="URL do anúncio (opcional) — standvirtual.com, olx.pt, custojusto.pt..."
                disabled={loading}
                style={{ width:"100%", background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:8, padding:"12px 14px", fontSize:13, fontFamily:F, outline:"none", color:"#1e293b", marginBottom:12 }}
                onFocus={e => e.target.style.borderColor="#d97706"}
                onBlur={e => e.target.style.borderColor="#e2e8f0"}
              />

              {/* Textarea */}
              <textarea
                value={text}
                onChange={e => setText(e.target.value)}
                disabled={loading}
                placeholder={"Cola aqui o texto do anúncio...\n\nEx: Dacia Jogger 1.0 ECO-G 100cv GPL · 2023 · 94 000 km · 15 900 € · 7 lugares · Stand XYZ, Porto · Garantia 12 meses · Livro revisões completo"}
                style={{ width:"100%", minHeight:140, background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:8, padding:"13px 14px", fontSize:13, fontFamily:F, outline:"none", color:"#1e293b", resize:"vertical", lineHeight:1.6, display:"block", opacity:loading ? 0.6 : 1 }}
                onFocus={e => e.target.style.borderColor="#d97706"}
                onBlur={e => e.target.style.borderColor="#e2e8f0"}
              />

              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginTop:14, gap:14 }}>
                <div style={{ fontSize:12, color:"#94a3b8", lineHeight:1.9 }}>
                  Abre o anúncio → <b style={{ color:"#64748b" }}>Ctrl+A</b> → <b style={{ color:"#64748b" }}>Ctrl+C</b> → cola aqui.<br/>
                  O URL é opcional — serve para guardar o link no resultado.
                </div>
                <button
                  onClick={analyze}
                  disabled={loading || !text.trim()}
                  style={{ background:!text.trim()||loading?"#94a3b8":"#1e293b", color:"#fff", border:"none", borderRadius:8, padding:"13px 24px", fontSize:13, fontWeight:800, cursor:!text.trim()||loading?"not-allowed":"pointer", fontFamily:F, whiteSpace:"nowrap", flexShrink:0 }}>
                  {loading ? "A ANALISAR..." : "ANALISAR →"}
                </button>
              </div>

              {!apiKey && (
                <div style={{ marginTop:14, fontSize:13, color:"#d97706", background:"#fffbeb", border:"1px solid #fde68a", borderRadius:8, padding:"11px 14px" }}>
                  ⚙ Precisas de uma API key Anthropic para usar a app.{" "}
                  <button onClick={() => setShowSettings(true)} style={{ background:"none", border:"none", color:"#d97706", fontWeight:800, cursor:"pointer", fontFamily:F, fontSize:13, textDecoration:"underline", padding:0 }}>
                    Configurar agora →
                  </button>
                </div>
              )}
            </div>

            {/* ERROR */}
            {error && (
              <div style={{ background:"#fef2f2", border:"1px solid #fecaca", borderRadius:8, padding:"14px 16px", fontSize:13, color:"#dc2626", marginBottom:20, lineHeight:1.6 }}>
                ⚠ {error}
              </div>
            )}

            {/* EMPTY STATE */}
            {!error && (
              <div style={{ textAlign:"center", padding:"48px 20px", color:"#94a3b8" }}>
                <div style={{ fontSize:48, marginBottom:16 }}>🚗</div>
                <div style={{ fontSize:17, fontWeight:800, color:"#334155", marginBottom:12 }}>Como funciona</div>
                <div style={{ fontSize:13, lineHeight:2.2 }}>
                  1. Abre o anúncio no Standvirtual, OLX ou CustoJusto<br/>
                  2. <b style={{ color:"#475569" }}>Ctrl+A</b> para seleccionar → <b style={{ color:"#475569" }}>Ctrl+C</b> para copiar<br/>
                  3. Cola acima e clica <b style={{ color:"#475569" }}>ANALISAR →</b><br/>
                  <span style={{ fontSize:12, color:"#cbd5e1" }}>A IA extrai os dados e calcula o custo real a 6 anos</span>
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, maxWidth:460, margin:"28px auto 0" }}>
                  {[
                    { icon:"📊", label:"Score de 0–100", desc:"baseado em TCO, fiabilidade e custo" },
                    { icon:"💶", label:"Custo real/mês", desc:"todos os custos incluídos a 6 anos" },
                    { icon:"⚠️", label:"Problemas", desc:"issues conhecidos do modelo específico" },
                  ].map(({ icon, label, desc }) => (
                    <div key={label} style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:10, padding:"16px 14px", textAlign:"center" }}>
                      <div style={{ fontSize:26, marginBottom:8 }}>{icon}</div>
                      <div style={{ fontSize:12, fontWeight:700, color:"#334155", marginBottom:4 }}>{label}</div>
                      <div style={{ fontSize:11, color:"#94a3b8", lineHeight:1.5 }}>{desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* PRO PROMO */}
            <ProBanner />
          </>
        )}
      </div>

      {showSettings && <Settings apiKey={apiKey} onSave={saveKey} onClose={() => setShowSettings(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
